# Optional: FalkorDB graph store (built-in Redis protocol, no separate Redis needed).
#
# Enable by adding to COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.falkordb.yml
#
# Then set in .env:
#   FALKORDB_URL=redis://falkordb:6379
#
# The GraphStore port (ports/graph_store.py) defines the interface any graph
# backend must implement. FalkorDB is the reference backend.
# See docs/extending-the-stack.md for details.

services:
  falkordb:
    # VERIFY-PLAN: v4.4.4 was retired from Docker Hub; pinned to current
    # stable (v4.18.1) so the parity / live-stack tests can pull successfully.
    image: falkordb/falkordb:v4.18.1
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  falkordb_data:
