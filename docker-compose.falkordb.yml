# Optional: FalkorDB graph store + Redis (required for graph plugins).
#
# Enable by adding to COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.gpu.yml:docker-compose.falkordb.yml
#
# Then set in .env:
#   FALKORDB_URL=redis://falkordb:6379
#
# The GraphStore port (ports/graph_store.py) and schema (docs/graph-schema.md)
# define what any conforming graph plugin must implement. FalkorDB is the
# reference backend. See docs/extending-the-stack.md for details.

services:
  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  falkordb_data:
  redis_data:
