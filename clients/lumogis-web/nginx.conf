# nginx serves the SPA bundle. SPA-routing fallback to index.html so that
# client-side routes (e.g. /chat, /approvals) survive a hard refresh. All
# /api/*, /events, /v1/*, /mcp/* requests are routed by Caddy to the
# orchestrator BEFORE they reach nginx — see docker/caddy/Caddyfile.

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness probe for compose healthchecks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
