services:
  orchestrator:
    build: ./orchestrator
    ports:
    - "8000:8000"
    env_file: .env
    environment:
      FILESYSTEM_ROOT: /data
    volumes:
      - ${FILESYSTEM_ROOT:-/tmp/lumogis-data}:/data:ro
      - ./config/models.yaml:/app/models.yaml:ro
      - ./ai-workspace:/workspace
    depends_on:
      - qdrant
      - postgres
      - falkordb

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumogis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumogis-dev}
      POSTGRES_DB: ${POSTGRES_DB:-lumogis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/00-create-ap-db.sh:/docker-entrypoint-initdb.d/00-create-ap-db.sh:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  activepieces:
    image: activepieces/activepieces:latest
    ports:
      - "8080:80"
    environment:
      AP_ENGINE_EXECUTABLE_PATH: dist/packages/engine/main.js
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_USERNAME: ${POSTGRES_USER:-lumogis}
      AP_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumogis-dev}
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: 6379
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY}
      AP_JWT_SECRET: ${AP_JWT_SECRET}
      AP_FRONTEND_URL: http://localhost:8080
      AP_EXECUTION_MODE: UNSANDBOXED
    depends_on:
      - postgres
      - redis

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    ports:
      - "3080:3080"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_TITLE: ${APP_TITLE:-Lumogis}
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - ./branding/favicon-16x16.png:/app/client/public/assets/favicon-16x16.png:ro
      - ./branding/favicon-32x32.png:/app/client/public/assets/favicon-32x32.png:ro
      - ./branding/favicon-16x16.png:/app/client/dist/assets/favicon-16x16.png:ro
      - ./branding/favicon-32x32.png:/app/client/dist/assets/favicon-32x32.png:ro
      - ./branding/logo.svg:/app/client/public/assets/logo.svg:ro
      - ./branding/logo.svg:/app/client/dist/assets/logo.svg:ro
    depends_on:
      - orchestrator
      - mongodb

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # GPU support added via docker-compose.gpu.yml (set by make setup)

  # LiteLLM is optional — see docker-compose.litellm.yml
  # Enable for rate limiting, spend tracking, and observability.

  # ntfy: self-hosted push notification server for signal alerts (Chunk 12a).
  # To enable:
  #   1. Uncomment the service below.
  #   2. Set NOTIFIER_BACKEND=ntfy in .env
  #   3. Set NTFY_URL=http://ntfy:80 and NTFY_TOPIC=lumogis in .env
  #   4. docker compose up -d ntfy
  #
  # ntfy:
  #   image: binwiederhier/ntfy:latest
  #   command: serve
  #   ports:
  #     - "8088:80"
  #   volumes:
  #     - ntfy_data:/var/cache/ntfy
  #   environment:
  #     NTFY_BASE_URL: http://localhost:8088
  #     NTFY_CACHE_FILE: /var/cache/ntfy/cache.db

volumes:
  mongodb_data:
  ollama_data:
  qdrant_data:
  postgres_data:
  falkordb_data:
  redis_data:
  # ntfy_data:   # uncomment if ntfy service above is enabled
