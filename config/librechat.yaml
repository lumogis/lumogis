# Lumogis LibreChat configuration — static cold-start default.
#
# LIFECYCLE NOTE: This file is overwritten by generate_librechat_yaml() in
# orchestrator/main.py during lifespan startup, before LibreChat reads it
# (LibreChat's depends_on: service_healthy on the orchestrator ensures ordering).
#
# This file serves two purposes:
#   1. Fresh repo audit: shows the expected initial config structure.
#   2. Regeneration safety net: if generate_librechat_yaml() fails, LibreChat
#      starts with this fallback rather than a missing or corrupt config file.
#
# This file must remain structurally valid YAML with at least the
# endpoints.custom and modelSpecs sections.

version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "Lumogis"
      apiKey: "ignored"
      baseURL: "http://orchestrator:8000/v1"
      models:
        default: ["claude"]
        fetch: true
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Lumogis"

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "claude"
      label: "Claude (Cloud)"
      default: true
      description: >
        Best for complex questions, research, and file search.
        Can search your indexed files by meaning and read their contents.
        Your files stay on your machine — only the question and relevant
        context snippets are sent to Claude via your own API key.
      iconURL: "anthropic"
      preset:
        endpoint: "Lumogis"
        model: "claude"
        modelLabel: "Claude (Cloud)"
        greeting: |
          You are connected to Claude via your own Anthropic API key.
          Your files stay on your machine — only the question and relevant context snippets are sent to Claude.
          I can search your indexed files by meaning and read their contents.
          To add local models: open the Dashboard (link in the footer) → Settings → Models.
