models:
  claude:
    adapter: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    tools: true
    # proxy_url: http://litellm:4000  # uncomment to route through LiteLLM

  qwen:
    adapter: openai
    model: qwen2.5:7b
    base_url: http://ollama:11434/v1
    tools: true
    # proxy_url: http://litellm:4000

  qwen-coder:
    adapter: openai
    model: qwen2.5-coder:7b
    base_url: http://ollama:11434/v1
    tools: false

  llama:
    adapter: openai
    model: llama3.2:3b
    base_url: http://ollama:11434/v1
    tools: false

