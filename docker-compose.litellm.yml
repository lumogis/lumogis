# Optional: adds LiteLLM proxy for rate limiting, spend tracking, observability.
#
# Enable by adding to COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.gpu.yml:docker-compose.litellm.yml
#
# Then set proxy_url on desired models in config/models.yaml:
#   proxy_url: http://litellm:4000

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - ollama
