<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="central" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFCC77"/>
      <stop offset="100%" stop-color="#E8890A"/>
    </radialGradient>
    <radialGradient id="satellite" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE0A0"/>
      <stop offset="100%" stop-color="#F5B845"/>
    </radialGradient>
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#F5A623" flood-opacity="0.35" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Mono:wght@300&amp;display=swap");
    </style>
  </defs>
  <rect width="1280" height="640" fill="#0D0D0F"/>
  <g transform="translate(510 120) scale(2.6)">
    <line x1="50" y1="50" x2="22" y2="24" stroke="#444444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="78" y2="28" stroke="#444444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="24" y2="72" stroke="#444444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="76" y2="74" stroke="#444444" stroke-width="2.5" stroke-linecap="round"/>
    <g filter="url(#nodeGlow)">
      <circle cx="22" cy="24" r="10" fill="url(#satellite)"/>
      <circle cx="78" cy="28" r="8" fill="url(#satellite)"/>
      <circle cx="24" cy="72" r="11" fill="url(#satellite)"/>
      <circle cx="76" cy="74" r="9" fill="url(#satellite)"/>
      <circle cx="50" cy="50" r="20" fill="url(#central)"/>
    </g>
  </g>
  <text x="640" y="420" text-anchor="middle" font-family="Syne, system-ui, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-0.02em">Lumogis</text>
  <text x="640" y="478" text-anchor="middle" font-family="&quot;DM Mono&quot;, ui-monospace, monospace" font-size="20" font-weight="300" fill="#888888" letter-spacing="0.01em">local ¯ private ¯ yours</text>
</svg>
